name: Deploy production

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: Existing Fly application name
        required: true
        type: string
      deploy_window_confirmed:
        description: Confirm the venue is closed and no visitors are present
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject an unconfirmed deploy window
        env:
          DEPLOY_WINDOW_CONFIRMED: ${{ inputs.deploy_window_confirmed }}
        run: test "$DEPLOY_WINDOW_CONFIRMED" = "true"
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy immutable commit version
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --app "${{ inputs.app_name }}" --config infra/fly.toml --build-arg BUILD_VERSION="${GITHUB_SHA}" --remote-only
